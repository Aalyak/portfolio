<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aalya Krishnan U — Full Stack Software Developer specialising in Python, Flask, React.js and real-time data pipelines." />
  <title>{% block title %}Aalya Krishnan U{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
</head>
</script>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">AK<span class="dot">.</span></a>
      <ul class="nav-links">
        <li><a href="/" class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">Home</a></li>
        <li><a href="/about" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
        <li><a href="/skills" class="nav-link {% if request.endpoint == 'skills' %}active{% endif %}">Skills</a></li>
        <li><a href="/projects" class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}">Projects</a></li>
        <li><a href="/experience" class="nav-link {% if request.endpoint == 'experience' %}active{% endif %}">Experience</a></li>
        <li><a href="/contact" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="/" onclick="closeMobile()">Home</a></li>
      <li><a href="/about" onclick="closeMobile()">About</a></li>
      <li><a href="/skills" onclick="closeMobile()">Skills</a></li>
      <li><a href="/projects" onclick="closeMobile()">Projects</a></li>
      <li><a href="/experience" onclick="closeMobile()">Experience</a></li>
      <li><a href="/contact" onclick="closeMobile()">Contact</a></li>
    </ul>
  </div>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>Built with Python & Flask · <span class="mono">Aalya Krishnan U</span> © 2026</p>
      <div class="footer-links">
        <a href="mailto:aalyakrishnan123@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/aalya-krishnan-a2b777263/" target="_blank">LinkedIn</a>
        <a href="https://github.com/Aalyak" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
